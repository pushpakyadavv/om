<!<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeAlgo - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Simple master login styles */
        .master-login-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }
        
        .master-login-wrapper .auth-btn {
            flex: 1;
            margin-top: 0;
        }
        
        .master-btn {
            width: 48px;
            height: 48px;
            min-width: 48px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 0;
        }
        
        .master-btn:hover {
            border-color: #f093fb;
            background: rgba(240, 147, 251, 0.15);
            color: #f093fb;
            transform: scale(1.05);
        }
        
        .master-btn.active {
            border-color: #f5576c;
            background: rgba(245, 87, 108, 0.2);
            color: #f5576c;
            box-shadow: 0 0 20px rgba(245, 87, 108, 0.2);
        }
        
        .master-btn i {
            font-size: 16px;
        }
        
        /* Master indicator - small and subtle */
        .master-indicator {
            display: none;
            text-align: center;
            margin-top: 8px;
            font-size: 12px;
            color: #f093fb;
            font-weight: 500;
        }
        
        .master-indicator.active {
            display: block;
        }
        
        .master-indicator i {
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <div class="logo-container">
                    <div class="auth-logo">C</div>
                    <h1>CubeAlgo</h1>
                </div>
                <p class="auth-subtitle">Login to your coding hub</p>
            </div>

            <form id="loginForm" class="auth-form" novalidate>
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                    <div id="email-error" class="error-message" role="alert"></div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i>
                        Password
                    </label>
                    <div class="password-input">
                        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" aria-label="Toggle password visibility" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="password-error" class="error-message" role="alert"></div>
                </div>

                <!-- Options -->
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" checked>
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <!-- Login + Master Button -->
                <div class="master-login-wrapper">
                    <button type="submit" class="auth-btn primary-btn" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </button>
                    <button type="button" class="master-btn" id="masterBtn" title="Master Login">
                        <i class="fas fa-crown"></i>
                    </button>
                </div>
            </form>

            <!-- Small master indicator -->
            <div id="masterIndicator" class="master-indicator">
                <i class="fas fa-crown"></i> Master Mode
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
        </div>
    </div>

    <div id="toastContainer" role="status" aria-live="polite"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    
    <script>
        (function() {
            'use strict';

            // =============================================
            // MASTER CREDENTIALS - CHANGE THESE
            // =============================================
            const MASTER_CREDENTIALS = {
                email: 'admin@cubealgo.com',
                password: 'admin123'
            };

            // DOM Elements
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberMe = document.getElementById('rememberMe');
            const submitBtn = document.getElementById('loginBtn');
            const masterBtn = document.getElementById('masterBtn');
            const emailError = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');
            const masterIndicator = document.getElementById('masterIndicator');

            // =============================================
            // MASTER LOGIN - One click!
            // =============================================
            masterBtn.addEventListener('click', function() {
                // Fill credentials
                emailInput.value = MASTER_CREDENTIALS.email;
                passwordInput.value = MASTER_CREDENTIALS.password;
                
                // Visual feedback
                this.classList.add('active');
                showToast('👑 Master login', 'info');
                
                // Auto submit
                setTimeout(() => {
                    form.dispatchEvent(new Event('submit'));
                }, 300);
            });

            // =============================================
            // PASSWORD TOGGLE
            // =============================================
            document.querySelectorAll('.toggle-password').forEach(button => {
                button.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    const input = document.getElementById(targetId);
                    const icon = this.querySelector('i');
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.className = 'fas fa-eye-slash';
                        this.setAttribute('aria-label', 'Hide password');
                    } else {
                        input.type = 'password';
                        icon.className = 'fas fa-eye';
                        this.setAttribute('aria-label', 'Show password');
                    }
                    
                    input.focus();
                });
            });

            // =============================================
            // REAL-TIME VALIDATION
            // =============================================
            emailInput.addEventListener('blur', function() {
                validateEmail(this.value);
            });

            passwordInput.addEventListener('blur', function() {
                validatePassword(this.value);
            });

            emailInput.addEventListener('focus', function() {
                emailError.textContent = '';
            });
            
            passwordInput.addEventListener('focus', function() {
                passwordError.textContent = '';
            });

            function validateEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    emailError.textContent = 'Please enter a valid email address';
                    return false;
                }
                emailError.textContent = '';
                return true;
            }

            function validatePassword(password) {
                if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    return false;
                }
                passwordError.textContent = '';
                return true;
            }

            // =============================================
            // FORM SUBMISSION
            // =============================================
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // Clear previous errors
                document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
                
                // Get values
                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // Validate
                let isValid = true;
                if (!validateEmail(email)) isValid = false;
                if (!validatePassword(password)) isValid = false;
                
                if (!isValid) {
                    showToast('Please fix the errors before submitting', 'error');
                    return;
                }

                // Show loading state
                submitBtn.disabled = true;
                const originalContent = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

                try {
                    // =============================================
                    // MASTER LOGIN CHECK
                    // =============================================
                    if (email === MASTER_CREDENTIALS.email && 
                        password === MASTER_CREDENTIALS.password) {
                        
                        // Master login - direct access
                        console.log('🔐 Master login');
                        
                        // Show master indicator
                        masterIndicator.classList.add('active');
                        masterBtn.classList.add('active');
                        
                        // Store master session
                        localStorage.setItem('master_session', JSON.stringify({
                            user: {
                                id: 'master-0001',
                                email: MASTER_CREDENTIALS.email,
                                username: 'MasterAdmin',
                                isMaster: true
                            },
                            expires_at: Date.now() + (24 * 60 * 60 * 1000)
                        }));
                        
                        showToast('👑 Welcome Master!', 'success');
                        
                        setTimeout(() => {
                            window.location.href = 'home.html';
                        }, 500);
                        
                        return;
                    }

                    // =============================================
                    // REGULAR LOGIN
                    // =============================================
                    const result = await login(email, password, rememberMe.checked);
                    
                    if (result.success) {
                        showToast('Welcome back! 🎉', 'success');
                        setTimeout(() => {
                            window.location.href = 'home.html';
                        }, 500);
                    } else {
                        const errorMsg = typeof result.error === 'string' 
                            ? result.error 
                            : result.error?.message || 'Login failed. Please check your credentials.';
                        showToast(errorMsg, 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalContent;
                        passwordInput.focus();
                        passwordInput.select();
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    showToast('An unexpected error occurred. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                }
            });

            // =============================================
            // SESSION CHECK
            // =============================================
            document.addEventListener('DOMContentLoaded', async function() {
                try {
                    // Check master session
                    const masterSession = localStorage.getItem('master_session');
                    if (masterSession) {
                        const sessionData = JSON.parse(masterSession);
                        if (sessionData.expires_at > Date.now()) {
                            masterIndicator.classList.add('active');
                            masterBtn.classList.add('active');
                            window.location.href = 'home.html';
                            return;
                        } else {
                            localStorage.removeItem('master_session');
                            masterIndicator.classList.remove('active');
                            masterBtn.classList.remove('active');
                        }
                    }
                    
                    // Check regular session
                    const session = await checkSession();
                    if (session) {
                        window.location.href = 'home.html';
                    }
                } catch (error) {
                    console.error('Session check failed:', error);
                }
            });

            // =============================================
            // KEYBOARD SHORTCUT: Ctrl+M for master login
            // =============================================
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
                    e.preventDefault();
                    masterBtn.click();
                }
            });

        })();
    </script>
</body>
</html>
