<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubeAlgo - Solve Problem</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/solve.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar glass">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="nav-logo">C</div>
                <span>CubeAlgo</span>
            </div>
            
            <div class="nav-menu" id="navMenu">
                <a href="home.html" class="nav-link">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="problems.html" class="nav-link">
                    <i class="fas fa-code"></i>
                    <span>Problems</span>
                </a>
                <a href="#" class="nav-link" id="leaderboardLink">
                    <i class="fas fa-trophy"></i>
                    <span>Leaderboard</span>
                </a>
                <a href="profile.html" class="nav-link">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </div>

            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="logout-btn" id="logoutBtn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="solve-main">
        <div class="solve-container">
            <!-- LEFT PANEL - Problem Statement -->
            <div class="problem-panel glass">
                <div class="problem-header">
                    <h2 id="problemTitle">Loading...</h2>
                    <span class="difficulty-badge" id="problemDifficulty">Easy</span>
                    <span class="score-badge" id="problemScore">+10</span>
                </div>
                <div class="problem-body">
                    <div class="problem-section">
                        <h3>📝 Description</h3>
                        <div class="problem-description" id="problemDescription">
                            <div class="loading-skeleton">
                                <div class="skeleton-text"></div>
                                <div class="skeleton-text"></div>
                                <div class="skeleton-text"></div>
                            </div>
                        </div>
                    </div>

                    <div class="problem-section">
                        <h3>⚡ Constraints</h3>
                        <div class="problem-constraints" id="problemConstraints">
                            <ul><li>Loading...</li></ul>
                        </div>
                    </div>

                    <div class="problem-section">
                        <h3>📚 Examples</h3>
                        <div class="problem-examples" id="problemExamples">
                            <div class="example-box"><p>Loading...</p></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL - Code Editor -->
            <div class="editor-panel glass">
                <div class="editor-controls">
                    <div class="language-selector">
                        <label for="languageSelect">
                            <i class="fas fa-code"></i>
                            Language
                        </label>
                        <select id="languageSelect">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="c">C</option>
                            <option value="cpp">C++</option>
                            <option value="java">Java</option>
                        </select>
                    </div>
                    <div class="editor-actions">
                        <button class="reset-btn" id="resetBtn">
                            <i class="fas fa-undo"></i> Reset
                        </button>
                    </div>
                </div>

                <div class="code-editor-container">
                    <textarea id="codeEditor" class="code-editor" spellcheck="false"></textarea>
                </div>

                <div class="editor-footer">
                    <div class="output-panel" id="outputPanel">
                        <div class="output-header">
                            <i class="fas fa-terminal"></i>
                            <span>Output</span>
                        </div>
                        <div class="output-content" id="outputContent">
                            <span class="output-placeholder">Run your code to see output</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="run-btn" id="runBtn">
                            <i class="fas fa-play"></i> Run
                        </button>
                        <button class="submit-btn" id="submitBtn">
                            <i class="fas fa-check"></i> Submit
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- ALL SOLVE LOGIC - Self-contained -->
    <script>
        console.log('🚀 solve.html loaded - Standalone mode');
        
        // ============================================
        // HARDCODED PROBLEMS (Fallback if Supabase fails)
        // ============================================
        const FALLBACK_PROBLEMS = {
            1: {
                id: 1,
                title: 'Two Sum',
                difficulty: 'easy',
                score: 10,
                description: 'Given an array of integers nums and an integer target, return indices of the two numbers such that they add up to target.\n\nYou may assume that each input would have exactly one solution, and you may not use the same element twice.\n\nYou can return the answer in any order.',
                constraints: '2 <= nums.length <= 10^4\n-10^9 <= nums[i] <= 10^9\n-10^9 <= target <= 10^9',
                params: 'nums, target',
                examples: '[{"input": "nums = [2,7,11,15], target = 9", "output": "[0,1]"}, {"input": "nums = [3,2,4], target = 6", "output": "[1,2]"}]'
            },
            2: {
                id: 2,
                title: 'Valid Parentheses',
                difficulty: 'easy',
                score: 10,
                description: 'Given a string s containing just the characters "(", ")", "{", "}", "[" and "]", determine if the input string is valid.\n\nAn input string is valid if:\n1. Open brackets must be closed by the same type of brackets.\n2. Open brackets must be closed in the correct order.\n3. Every close bracket has a corresponding open bracket of the same type.',
                constraints: '1 <= s.length <= 10^4\ns consists of parentheses only',
                params: 's',
                examples: '[{"input": "s = \\"()\\"", "output": "true"}, {"input": "s = \\"()[]{}\\"", "output": "true"}, {"input": "s = \\"(]\\"", "output": "false"}]'
            },
            3: {
                id: 3,
                title: 'Merge Two Sorted Lists',
                difficulty: 'easy',
                score: 10,
                description: 'You are given the heads of two sorted linked lists list1 and list2.\n\nMerge the two lists into one sorted list. The list should be made by splicing together the nodes of the first two lists.\n\nReturn the head of the merged linked list.',
                constraints: 'The number of nodes in both lists is in the range [0, 50].\n-100 <= Node.val <= 100\nBoth list1 and list2 are sorted in non-decreasing order.',
                params: 'l1, l2',
                examples: '[{"input": "l1 = [1,2,4], l2 = [1,3,4]", "output": "[1,1,2,3,4,4]"}, {"input": "l1 = [], l2 = []", "output": "[]"}]'
            }
        };

        // ============================================
        // GET PROBLEM - Try Supabase first, then fallback
        // ============================================
        async function getProblem(problemId) {
            console.log('📥 Getting problem:', problemId);
            
            try {
                // Try Supabase first
                const { data, error } = await supabaseClient
                    .from('problems')
                    .select('*')
                    .eq('id', parseInt(problemId))
                    .single();
                
                if (error) {
                    console.warn('⚠️ Supabase error, using fallback:', error.message);
                    return FALLBACK_PROBLEMS[problemId] || null;
                }
                
                if (data) {
                    console.log('✅ Problem from Supabase:', data);
                    return data;
                }
                
                console.warn('⚠️ Problem not in Supabase, using fallback');
                return FALLBACK_PROBLEMS[problemId] || null;
            } catch (e) {
                console.warn('⚠️ Supabase failed, using fallback:', e.message);
                return FALLBACK_PROBLEMS[problemId] || null;
            }
        }

        // ============================================
        // UPDATE UI
        // ============================================
        function displayProblem(problem) {
            if (!problem) {
                document.getElementById('problemTitle').textContent = '❌ Problem Not Found';
                document.getElementById('problemDescription').innerHTML = 
                    '<p style="color: var(--danger);">Problem could not be loaded.</p>';
                return;
            }

            console.log('📝 Displaying problem:', problem.title);
            
            // Header
            document.getElementById('problemTitle').textContent = problem.title;
            document.getElementById('problemDifficulty').textContent = 
                problem.difficulty.charAt(0).toUpperCase() + problem.difficulty.slice(1);
            document.getElementById('problemDifficulty').className = 
                `difficulty-badge ${problem.difficulty}`;
            document.getElementById('problemScore').textContent = `+${problem.score || 10}`;
            
            // Description
            if (problem.description) {
                document.getElementById('problemDescription').innerHTML = 
                    `<p>${problem.description.replace(/\n/g, '<br>')}</p>`;
            }
            
            // Constraints
            if (problem.constraints) {
                const constraints = problem.constraints.split('\n').filter(c => c.trim());
                document.getElementById('problemConstraints').innerHTML = 
                    `<ul>${constraints.map(c => `<li>${c.trim()}</li>`).join('')}</ul>`;
            }
            
            // Examples
            if (problem.examples) {
                try {
                    const examples = JSON.parse(problem.examples);
                    document.getElementById('problemExamples').innerHTML = 
                        examples.map((ex, i) => `
                            <div class="example-box">
                                <div class="example-label">Example ${i + 1}:</div>
                                <pre>Input: ${ex.input}\nOutput: ${ex.output}</pre>
                            </div>
                        `).join('');
                } catch {
                    document.getElementById('problemExamples').innerHTML = 
                        `<div class="example-box"><pre>${problem.examples}</pre></div>`;
                }
            }
        }

        // ============================================
        // RUN CODE (Mock execution for demo)
        // ============================================
        async function runCode(code, language) {
            const outputContent = document.getElementById('outputContent');
            const runBtn = document.getElementById('runBtn');
            
            if (!code || code.trim() === '') {
                showToast('Please write some code first', 'error');
                return;
            }
            
            runBtn.disabled = true;
            runBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Running...';
            outputContent.textContent = '⏳ Running...';
            outputContent.className = 'output-content';
            
            try {
                // Try Piston API
                const response = await fetch('https://emkc.org/api/v1/piston/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: language,
                        version: '*',
                        files: [{ name: 'solution', content: code }]
                    })
                });
                
                if (response.ok) {
                    const result = await response.json();
                    outputContent.textContent = result.run?.output || 'No output';
                    outputContent.className = 'output-content success';
                    showToast('Code executed!', 'success');
                } else {
                    // Mock output
                    outputContent.textContent = `⚠️ API unavailable\n\nMock output for:\n${code.substring(0, 100)}...`;
                    outputContent.className = 'output-content';
                    showToast('Using mock output', 'info');
                }
            } catch (e) {
                outputContent.textContent = `⚠️ Error: ${e.message}\n\nUsing mock output:\n${code.substring(0, 100)}...`;
                outputContent.className = 'output-content';
            } finally {
                runBtn.disabled = false;
                runBtn.innerHTML = '<i class="fas fa-play"></i> Run';
            }
        }

        // ============================================
        // SUBMIT SOLUTION
        // ============================================
        async function submitSolution(code, language) {
            const outputContent = document.getElementById('outputContent');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!code || code.trim() === '') {
                showToast('Please write some code', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
            outputContent.textContent = '⏳ Submitting...';
            outputContent.className = 'output-content';
            
            try {
                const user = await getCurrentUser();
                if (!user) {
                    showToast('Please login first', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Submit';
                    return;
                }
                
                // Simple validation
                if (!code.includes('solution')) {
                    outputContent.textContent = '❌ Your code must contain a "solution" function.';
                    outputContent.className = 'output-content error';
                    showToast('Missing solution function', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Submit';
                    return;
                }
                
                // Save submission (if Supabase available)
                const problemId = parseInt(new URLSearchParams(window.location.search).get('id')) || 1;
                await saveSubmission(user.id, problemId, language, code, 'accepted', 10);
                
                outputContent.textContent = `✅ Accepted!\nScore: +10 points\n\nGreat job!`;
                outputContent.className = 'output-content success';
                showToast('Accepted! +10 points', 'success');
                
                const badge = document.getElementById('problemDifficulty');
                badge.textContent = `${document.getElementById('problemDifficulty').textContent} ✅ Solved`;
                badge.style.borderColor = 'var(--success)';
            } catch (e) {
                outputContent.textContent = `❌ Error: ${e.message}`;
                outputContent.className = 'output-content error';
                showToast('Error submitting', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Submit';
            }
        }

        function resetCode() {
            if (originalCode) {
                if (confirm('Reset code to original?')) {
                    document.getElementById('codeEditor').value = originalCode;
                    showToast('Code reset', 'info');
                }
            }
        }

        // ============================================
        // MAIN INITIALIZATION
        // ============================================
        let originalCode = '';
        
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Initializing solve page');
            
            try {
                // Check authentication
                const session = await checkSession();
                if (!session) {
                    window.location.href = 'index.html';
                    return;
                }

                // Get problem ID
                const urlParams = new URLSearchParams(window.location.search);
                const problemId = urlParams.get('id');
                console.log('📥 Problem ID:', problemId);

                if (!problemId) {
                    showToast('No problem specified', 'error');
                    setTimeout(() => window.location.href = 'problems.html', 1000);
                    return;
                }

                // Load problem
                const problem = await getProblem(problemId);
                console.log('📥 Problem loaded:', problem);
                
                if (problem) {
                    displayProblem(problem);
                    
                    // Set initial code
                    const language = document.getElementById('languageSelect').value;
                    originalCode = `// ${problem.title}\n// Difficulty: ${problem.difficulty}\n\nfunction solution(${problem.params || 'nums, target'}) {\n    // Write your solution here\n    \n}\n\nconsole.log(solution([2, 7, 11, 15], 9));`;
                    document.getElementById('codeEditor').value = originalCode;
                    showToast('Problem loaded!', 'success');
                } else {
                    showToast('Problem not found', 'error');
                }
            } catch (e) {
                console.error('❌ Error:', e);
                showToast('Error loading page', 'error');
            }
        });

        // ============================================
        // EVENT LISTENERS
        // ============================================
        document.getElementById('runBtn').addEventListener('click', function() {
            runCode(document.getElementById('codeEditor').value, document.getElementById('languageSelect').value);
        });

        document.getElementById('submitBtn').addEventListener('click', function() {
            submitSolution(document.getElementById('codeEditor').value, document.getElementById('languageSelect').value);
        });

        document.getElementById('resetBtn').addEventListener('click', resetCode);

        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await logout();
            showToast('Logged out', 'info');
            setTimeout(() => window.location.href = 'index.html', 500);
        });

        document.getElementById('mobileMenuBtn').addEventListener('click', function() {
            document.getElementById('navMenu').classList.toggle('active');
        });

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        loadTheme();

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode(document.getElementById('codeEditor').value, document.getElementById('languageSelect').value);
            }
        });
    </script>
</body>
</html>
